# Workflow: checks YouTube channels and posts to Discord
name: YouTube to Discord

on:
  schedule:
    - cron: "*/5 * * * *"  # Runs every 5 minutes
  workflow_dispatch:
    inputs:
      force_channel_id:
        description: 'Channel ID to force-post (leave empty for normal check)'
        required: false
        default: ''
      reset_state:
        description: 'Update state.json without posting to Discord (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_CHANNEL_IDS: ${{ secrets.YOUTUBE_CHANNEL_IDS }}
          DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
          BOT_NAME: ${{ secrets.BOT_NAME }}
          BOT_AVATAR_URL: ${{ secrets.BOT_AVATAR_URL }}
          FORCE_CHANNEL_ID: ${{ github.event.inputs.force_channel_id }}
          RESET_STATE: ${{ github.event.inputs.reset_state }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: python youtube_to_discord.py

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state.json"
            git push
          else
            echo "No changes to state.json"
          fi
